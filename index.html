<!DOCTYPE html>
<html dir="rtl" lang="he">
<head>
    <meta charset="UTF-8">
    <title>Evenmix - כלי ניהול לידים אישי</title>
    <style>
        body { font-family: sans-serif; background: #f0f0f0; padding: 20px; }
        .input-box { background: white; padding: 20px; border-radius: 10px; margin-bottom: 20px; }
        input { padding: 10px; margin: 5px; width: 200px; }
        .lead-card { background: white; padding: 15px; margin-bottom: 10px; border-radius: 8px; display: flex; justify-content: space-between; align-items: center; }
    </style>
</head>
<body>

<div class="input-box">
    <h3>הוסף ליד חדש (שמצאת באתר החברה)</h3>
    <input type="text" id="name" placeholder="שם החברה">
    <input type="text" id="phone" placeholder="מספר טלפון (ללא מקפים)">
    <button onclick="addLead()">הוסף לרשימה</button>
</div>

<div id="list"></div>

<script>
    let leads = JSON.parse(localStorage.getItem('evenmix_leads') || '[]');

    function addLead() {
        const n = document.getElementById('name').value;
        const p = document.getElementById('phone').value;
        if(n && p) {
            leads.push({id: Date.now(), n, p});
            localStorage.setItem('evenmix_leads', JSON.stringify(leads));
            render();
        }
    }

    function render() {
        document.getElementById('list').innerHTML = leads.map(l => `
            <div class="lead-card">
                <div><strong>${l.n}</strong><br>${l.p}</div>
                <div>
                    <a href="https://wa.me/972${l.p.replace(/^0/, '')}">💬 ווטסאפ</a> | 
                    <a href="tel:${l.p}">📞 חיוג</a>
                </div>
            </div>`).join('');
    }
    render();
</script>
</body>
</html>
