        .header { background: white; padding: 15px; text-align: center; border-bottom: 3px solid var(--blue); position: sticky; top: 0; z-index: 1000; }
        .container { max-width: 600px; margin: auto; padding: 15px; }
        .card { background: white; border-radius: 12px; padding: 15px; margin-bottom: 12px; display: flex; justify-content: space-between; align-items: center; border-right: 6px solid var(--blue); box-shadow: 0 2px 5px rgba(0,0,0,0.05); }
        .card.visited { background: var(--visited); border-right-color: #7b1fa2; opacity: 0.8; }
        .info h3 { margin: 0; font-size: 15px; color: var(--blue); }
        .info p { margin: 4px 0; font-size: 12px; color: #666; }
        .actions { display: flex; gap: 10px; }
        .btn { width: 44px; height: 44px; border-radius: 50%; display: flex; align-items: center; justify-content: center; text-decoration: none; color: white; font-size: 20px; border: none; cursor: pointer; }
        .btn-wa { background: var(--wa); }

    function render() {

        container.innerHTML = contractors.map(c => {

            return `
                <div class="card ${isVisited ? 'visited' : ''}" id="card-${c.id}">
                    <div class="info">
                        <h3>${c.n}</h3>
                        <p>${c.s}</p>
                    </div>
                    <div class="actions">
                        <a href="https://wa.me/${cleanP}?text=${encodeURIComponent(msg)}" class="btn btn-wa" onclick="markVisited(${c.id})">💬</a>
                        <a href="tel:${c.p}" class="btn btn-tel" onclick="markVisited(${c.id})">📞</a>
                    </div>
                </div>`;
        }).join('');
    }

    function markVisited(id) {
        if (!visitedIds.includes(id)) {
            visitedIds.push(id);
            localStorage.setItem('evenmix_mega_list_v3', JSON.stringify(visitedIds));
            document.getElementById(`card-${id}`).classList.add('visited');
        }
    }

    render();
