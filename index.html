<html lang="he" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>אבנמיקס | מאגר קבלנים</title>
<link href="https://fonts.googleapis.com/css2?family=Heebo:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet">
<style>
/* ─── TOKENS (matched to evenmix.online) ─── */
:root {
  --bg:       #0d0d0d;
  --bg2:      #141414;
  --bg3:      #1a1a1a;
  --border:   rgba(255,255,255,0.08);
  --gold:     #b89655;
  --gold-lt:  #d4b476;
  --gold-dim: rgba(184,150,85,0.15);
  --white:    #ffffff;
  --muted:    rgba(255,255,255,0.45);
  --muted2:   rgba(255,255,255,0.18);
  --wa:       #25D366;
  --call:     #3a86ff;
  --radius:   10px;
}

*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

html { scroll-behavior: smooth; }

body {
  font-family: 'Heebo', sans-serif;
  background: var(--bg);
  color: var(--white);
  min-height: 100vh;
  -webkit-font-smoothing: antialiased;
}

/* ─── HEADER ─── */
header {
  background: var(--bg2);
  border-bottom: 1px solid var(--border);
  position: sticky;
  top: 0;
  z-index: 200;
  backdrop-filter: blur(12px);
}

.header-inner {
  max-width: 1280px;
  margin: 0 auto;
  padding: 0 28px;
  height: 68px;
  display: flex;
  align-items: center;
  justify-content: space-between;
  gap: 20px;
}

.logo-wrap {
  display: flex;
  align-items: center;
  gap: 14px;
  text-decoration: none;
}

.logo-img {
  height: 38px;
  filter: brightness(0) invert(1);
}

.logo-divider {
  width: 1px;
  height: 28px;
  background: var(--border);
}

.logo-label {
  font-size: 13px;
  color: var(--muted);
  font-weight: 400;
  letter-spacing: 0.3px;
}

.header-right {
  display: flex;
  align-items: center;
  gap: 14px;
}

.pill {
  background: var(--gold-dim);
  border: 1px solid rgba(184,150,85,0.35);
  border-radius: 20px;
  padding: 5px 14px;
  font-size: 12px;
  color: var(--gold-lt);
  font-weight: 600;
  white-space: nowrap;
}

.site-link {
  font-size: 12px;
  color: var(--muted);
  text-decoration: none;
  transition: color .2s;
}
.site-link:hover { color: var(--gold-lt); }

/* ─── HERO STRIP ─── */
.hero {
  background: linear-gradient(135deg, #111 0%, #1c1508 50%, #0d0d0d 100%);
  border-bottom: 1px solid var(--border);
  padding: 48px 28px 44px;
  text-align: center;
  position: relative;
  overflow: hidden;
}

.hero::before {
  content: '';
  position: absolute;
  inset: 0;
  background: radial-gradient(ellipse 70% 80% at 50% 120%, rgba(184,150,85,0.10) 0%, transparent 70%);
  pointer-events: none;
}

.hero-eyebrow {
  display: inline-block;
  font-size: 11px;
  font-weight: 700;
  letter-spacing: 2.5px;
  text-transform: uppercase;
  color: var(--gold);
  margin-bottom: 14px;
  border: 1px solid rgba(184,150,85,0.3);
  border-radius: 20px;
  padding: 4px 14px;
}

.hero h1 {
  font-size: clamp(26px, 4vw, 40px);
  font-weight: 900;
  color: var(--white);
  line-height: 1.15;
  margin-bottom: 10px;
}

.hero h1 span { color: var(--gold-lt); }

.hero-sub {
  font-size: 15px;
  color: var(--muted);
  font-weight: 300;
  max-width: 500px;
  margin: 0 auto;
  line-height: 1.6;
}

/* ─── SEARCH BAR ─── */
.search-wrap {
  background: var(--bg2);
  border-bottom: 1px solid var(--border);
  padding: 14px 28px;
  position: sticky;
  top: 68px;
  z-index: 100;
}

.search-inner {
  max-width: 1280px;
  margin: 0 auto;
  display: flex;
  gap: 10px;
  align-items: center;
  flex-wrap: wrap;
}

.input-wrap {
  flex: 1;
  min-width: 180px;
  position: relative;
}

.input-wrap svg {
  position: absolute;
  left: 13px;
  top: 50%;
  transform: translateY(-50%);
  width: 15px;
  height: 15px;
  fill: none;
  stroke: var(--muted);
  stroke-width: 2;
  pointer-events: none;
}

.search-input, .city-select {
  background: var(--bg3);
  border: 1px solid var(--border);
  color: var(--white);
  font-family: 'Heebo', sans-serif;
  font-size: 13px;
  border-radius: var(--radius);
  outline: none;
  transition: border-color .2s;
}

.search-input {
  width: 100%;
  padding: 10px 14px 10px 38px;
}

.search-input::placeholder { color: var(--muted); }
.search-input:focus { border-color: rgba(184,150,85,0.5); }

.city-select {
  padding: 10px 13px;
  cursor: pointer;
  appearance: none;
  min-width: 130px;
}

.city-select option { background: #1a1a1a; }

.count-pill {
  background: var(--gold);
  color: var(--bg);
  border-radius: 20px;
  padding: 6px 14px;
  font-size: 12px;
  font-weight: 800;
  white-space: nowrap;
}

/* ─── GRID ─── */
.grid {
  max-width: 1280px;
  margin: 28px auto;
  padding: 0 20px 60px;
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(295px, 1fr));
  gap: 14px;
}

/* ─── CARD ─── */
.card {
  background: var(--bg2);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  padding: 18px 18px 14px;
  display: flex;
  flex-direction: column;
  gap: 12px;
  cursor: default;
  transition: border-color .22s, transform .22s, box-shadow .22s;
  animation: cardIn .35s ease both;
  position: relative;
  overflow: hidden;
}

.card::before {
  content: '';
  position: absolute;
  top: 0; right: 0;
  width: 60px; height: 2px;
  background: linear-gradient(to left, var(--gold), transparent);
  opacity: 0;
  transition: opacity .22s;
}

.card:hover {
  border-color: rgba(184,150,85,0.35);
  transform: translateY(-2px);
  box-shadow: 0 10px 30px rgba(0,0,0,0.4);
}

.card:hover::before { opacity: 1; }

@keyframes cardIn {
  from { opacity:0; transform:translateY(14px); }
  to   { opacity:1; transform:translateY(0); }
}

/* card top */
.card-head {
  display: flex;
  align-items: center;
  gap: 12px;
}

.avatar {
  width: 42px;
  height: 42px;
  border-radius: 50%;
  background: linear-gradient(135deg, #2a2010, #4a3820);
  border: 1px solid rgba(184,150,85,0.35);
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 14px;
  font-weight: 800;
  color: var(--gold-lt);
  flex-shrink: 0;
  letter-spacing: -0.5px;
}

.card-name {
  font-size: 14px;
  font-weight: 700;
  color: var(--white);
  line-height: 1.25;
}

.card-company {
  font-size: 11px;
  color: var(--muted);
  margin-top: 2px;
  font-weight: 400;
}

/* tags */
.card-tags {
  display: flex;
  gap: 6px;
  flex-wrap: wrap;
}

.tag {
  font-size: 10px;
  padding: 3px 9px;
  border-radius: 20px;
  font-weight: 600;
}

.tag-city {
  background: rgba(255,255,255,0.06);
  color: var(--muted);
  border: 1px solid var(--border);
}

.tag-mobile {
  background: rgba(37,211,102,0.12);
  color: #4ade80;
  border: 1px solid rgba(37,211,102,0.25);
}

/* phones */
.card-phones {
  display: flex;
  flex-direction: column;
  gap: 3px;
}

.phone-row {
  font-size: 13px;
  color: rgba(255,255,255,0.7);
  font-weight: 500;
  direction: ltr;
  text-align: right;
  display: flex;
  align-items: center;
  gap: 6px;
  justify-content: flex-end;
}

.phone-row .ph-icon { font-size: 12px; opacity: .6; }

/* divider */
.card-sep {
  height: 1px;
  background: var(--border);
}

/* actions */
.card-actions {
  display: flex;
  gap: 8px;
}

.btn {
  flex: 1;
  padding: 9px 8px;
  border: none;
  border-radius: 7px;
  font-family: 'Heebo', sans-serif;
  font-size: 12px;
  font-weight: 700;
  cursor: pointer;
  display: flex;
  align-items: center;
  justify-content: center;
  gap: 5px;
  text-decoration: none;
  transition: opacity .18s, transform .1s, box-shadow .18s;
}

.btn:hover { opacity: .88; transform: scale(.98); }

.btn-wa {
  background: var(--wa);
  color: #fff;
  box-shadow: 0 4px 14px rgba(37,211,102,0.2);
}

.btn-wa:hover { box-shadow: 0 6px 18px rgba(37,211,102,0.35); }

.btn-call {
  background: var(--call);
  color: #fff;
  box-shadow: 0 4px 14px rgba(58,134,255,0.2);
}

.btn-call:hover { box-shadow: 0 6px 18px rgba(58,134,255,0.35); }

.btn svg { width: 14px; height: 14px; fill: currentColor; flex-shrink: 0; }

/* empty */
.empty {
  grid-column: 1/-1;
  text-align: center;
  padding: 80px 20px;
  color: var(--muted);
  font-size: 16px;
}

/* ─── FOOTER ─── */
footer {
  background: var(--bg2);
  border-top: 1px solid var(--border);
  padding: 24px 28px;
  text-align: center;
}

.footer-logo {
  font-size: 18px;
  font-weight: 900;
  color: var(--gold);
  letter-spacing: 1px;
  margin-bottom: 8px;
}

.footer-links {
  font-size: 12px;
  color: var(--muted);
  display: flex;
  gap: 16px;
  justify-content: center;
  flex-wrap: wrap;
}

.footer-links a {
  color: var(--muted);
  text-decoration: none;
  transition: color .2s;
}
.footer-links a:hover { color: var(--gold-lt); }

/* ─── RESPONSIVE ─── */
@media (max-width: 600px) {
  .header-inner { padding: 0 16px; height: 58px; }
  .hero { padding: 36px 16px 32px; }
  .search-wrap { top: 58px; padding: 12px 16px; }
  .grid { padding: 0 12px 40px; gap: 10px; margin-top: 18px; }
  .logo-label, .logo-divider { display: none; }
}
</style>
</head>
